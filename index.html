<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="pageTitle">AI 使用量儀表板</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b1220'/%3E%3Crect x='5' y='17' width='5' height='10' rx='1.5' fill='%2322c55e'/%3E%3Crect x='13.5' y='11' width='5' height='16' rx='1.5' fill='%23fbbf24'/%3E%3Crect x='22' y='6' width='5' height='21' rx='1.5' fill='%2338bdf8'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0b1220;
    --panel: #121b30;
    --panel-edge: #24334f;
    --text: #dbe6f7;
    --muted: #7e91b3;
    --sky: #38bdf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 70% -10%, #16233f 0%, var(--bg) 60%);
    color: var(--text);
    font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
    min-height: 100vh;
    padding: 20px clamp(10px, 3vw, 40px);
  }

  header {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  h1 { font-size: 20px; letter-spacing: 3px; font-weight: 700; }
  h1 .pix { color: var(--sky); }
  #status {
    font-size: 12px; color: var(--muted);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border: 1px solid var(--panel-edge); border-radius: 999px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; flex: none; }
  .dot.ok  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .dot.err { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .spacer { flex: 1; }
  button {
    font: inherit; color: var(--text); cursor: pointer;
    background: #1a2740; border: 1px solid var(--panel-edge); border-radius: 8px;
    padding: 6px 14px;
  }
  button:hover { border-color: var(--sky); }
  button.primary { background: #0c4a6e; border-color: #0284c7; }
  button.danger  { background: #450a0a; border-color: #b91c1c; }
  #langToggle { font-size: 12px; padding: 6px 12px; }

  /* ---------- 提供商橫列 ---------- */
  #rows { display: flex; flex-direction: column; gap: 14px; }
  .row {
    display: grid; grid-template-columns: 170px 1fr; gap: 14px; align-items: center;
    background: linear-gradient(180deg, #16223c, var(--panel));
    border: 1px solid var(--panel-edge); border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 4px 18px rgba(0,0,0,.35);
  }
  .prov { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .prov-name {
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .drag-handle {
    cursor: grab; color: var(--muted); font-size: 15px;
    user-select: none; flex: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .row.dragging { opacity: .45; }
  .row.drag-over-top    { box-shadow: 0 -3px 0 var(--sky), 0 4px 18px rgba(0,0,0,.35); }
  .row.drag-over-bottom { box-shadow: 0  3px 0 var(--sky), 0 4px 18px rgba(0,0,0,.35); }

  /* 觸控/窄螢幕:拖拉不可用,改用上下移動鍵 */
  .move-btns { display: none; gap: 6px; }
  .move-btns button { padding: 3px 12px; font-size: 13px; line-height: 1; }
  .move-btns button:disabled { opacity: .25; cursor: default; }
  @media (max-width: 720px), (pointer: coarse) {
    .move-btns { display: flex; }
    .drag-handle { display: none; }
  }
  .prov-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .prov-err { font-size: 11px; color: #fca5a5; line-height: 1.3; }
  .edit-btn { align-self: flex-start; font-size: 12px; padding: 3px 10px; }

  .metrics {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
  }
  .metric { min-width: 0; }
  .metric-label {
    font-size: 11px; color: var(--muted); letter-spacing: 1px;
    margin-bottom: 5px; display: flex; justify-content: space-between; gap: 4px;
    white-space: nowrap; overflow: hidden;
  }
  .src { color: #475a7d; font-size: 10px; }
  .sub { font-size: 11px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---------- 血條 ---------- */
  .bar {
    position: relative; height: 24px; border-radius: 7px;
    background: #080d1a; border: 1px solid #2b3b5e;
    overflow: hidden;
  }
  .fill {
    position: absolute; top: 0; bottom: 0; left: 0;
    border-radius: 6px 0 0 6px;
    transition: width .6s ease;
  }
  .fill::after { /* 頂部高光,電玩血條質感 */
    content: ""; position: absolute; left: 0; right: 0; top: 0; height: 45%;
    background: linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,0));
    border-radius: 6px 6px 0 0;
  }
  .ticks { /* 血條分格線 */
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(90deg,
      transparent 0, transparent calc(10% - 1px),
      rgba(0,0,0,.45) calc(10% - 1px), rgba(0,0,0,.45) 10%);
  }
  .bar-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.9);
    pointer-events: none;
  }
  /* 無法讀取:灰色虛線框,避免誤導 */
  .bar.na { border-style: dashed; border-color: #3d4a66; background: #0d1424; }
  .na-text { color: #64748b !important; text-shadow: none !important; font-weight: 600; }
  .bar.mini { height: 10px; flex: 1; min-width: 60px; border-radius: 4px; }
  .ctx-line { display: flex; align-items: center; gap: 6px; margin-top: 5px; font-size: 11px; color: var(--muted); }
  .ctx-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: none; }
  .ctx-pct { flex: none; }
  details.ctx-more { font-size: 11px; color: var(--muted); margin-top: 4px; }
  details.ctx-more summary { cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .fill.g { background: linear-gradient(180deg, #4ade80, #15803d); }
  .fill.y { background: linear-gradient(180deg, #fde047, #a16207); }
  .fill.o { background: linear-gradient(180deg, #fb923c, #c2410c); }
  .fill.r { background: linear-gradient(180deg, #f87171, #b91c1c); animation: lowhp 1s infinite; }
  @keyframes lowhp { 50% { filter: brightness(1.45); } }

  /* ---------- 重生倒數條(淡藍框,天空藍隨時間填滿) ---------- */
  .bar.cd { border-color: rgba(125,211,252,.4); background: rgba(12,26,46,.9); }
  .bar.cd .fill { background: linear-gradient(180deg, #7dd3fc, #0369a1); }
  .bar.cd.ready { border-color: var(--sky); box-shadow: 0 0 10px rgba(56,189,248,.55); }
  .bar.cd.ready .fill { animation: readyPulse 1.2s infinite; }
  @keyframes readyPulse { 50% { filter: brightness(1.5); } }

  /* 重生倒數 < 30 分鐘:外框開始發亮蓄力,越接近重生脈動越快(電玩「準備爆發」感) */
  .bar.cd.soon {
    animation: chargeGlow var(--charge-speed, 1.4s) ease-in-out infinite;
  }
  @keyframes chargeGlow {
    0%, 100% {
      border-color: rgba(125,211,252,.55);
      box-shadow: 0 0 4px rgba(56,189,248,.35), inset 0 0 4px rgba(56,189,248,.15);
      transform: scale(1);
    }
    50% {
      border-color: #7dd3fc;
      box-shadow: 0 0 14px rgba(56,189,248,.9), 0 0 26px rgba(56,189,248,.5), inset 0 0 8px rgba(56,189,248,.35);
      transform: scale(1.015);
    }
  }

  .empty-note { color: var(--muted); text-align: center; padding: 40px 0; font-size: 14px; }
  #verTag { font-size: 10px; color: var(--muted); opacity: .7; letter-spacing: 1px; }

  /* ---------- 🐑 薅羊毛進度(可摺疊,預設收起 = 金錢焦慮開關) ---------- */
  .wool {
    margin-top: 14px;
    background: linear-gradient(180deg, #16223c, var(--panel));
    border: 1px solid var(--panel-edge); border-radius: 14px;
    padding: 10px 16px 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,.35);
  }
  .wool summary {
    cursor: pointer; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 14px; font-weight: 700; letter-spacing: 1px; list-style: none;
  }
  .wool summary::-webkit-details-marker { display: none; }
  .wool-brief { font-size: 12px; color: var(--muted); font-weight: 400; letter-spacing: 0; }
  .wool-body { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .wool-stats { display: flex; flex-wrap: wrap; gap: 6px 18px; font-size: 13px; }
  .wool-note { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .wool-form { display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: center; font-size: 12px; color: var(--muted); }
  .wool-form label { display: inline-flex; align-items: center; gap: 5px; }
  .wool-form input { flex: none; width: 132px; }
  .wool-form input[type="number"] { width: 76px; }
  .wool-form button { font-size: 12px; padding: 4px 12px; }
  .wool-bar .fill { background: linear-gradient(180deg, #fcd34d, #b45309); } /* 羊毛金:燒越多越接近完美榨乾 */

  /* ---------- 📦 其他提供商摺疊區(目前只用 Claude,其餘降級收納,預設收起) ---------- */
  .minor {
    background: linear-gradient(180deg, #16223c, var(--panel));
    border: 1px solid var(--panel-edge); border-radius: 14px;
    padding: 10px 16px 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,.35);
  }
  .minor summary {
    cursor: pointer; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 14px; font-weight: 700; letter-spacing: 1px; list-style: none;
  }
  .minor summary::-webkit-details-marker { display: none; }
  .minor-brief { font-size: 12px; color: var(--muted); font-weight: 400; letter-spacing: 0; }
  .minor-rows { display: flex; flex-direction: column; gap: 14px; margin-top: 12px; }
  /* 浮窗只看 Claude 就好(2026-07-19 主人裁決),其他提供商連摺疊列都不顯示;瀏覽器完整版仍看得到 */
  .widget-mode .minor { display: none; }
  .mini-mode .wool { display: none; }
  .widget-mode .wool { background: linear-gradient(180deg, rgba(22,34,60,var(--ca,.55)), rgba(18,27,48,var(--ca,.55))); }

  /* ---------- RWD ---------- */
  @media (max-width: 1100px) {
    .metrics { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  }
  @media (max-width: 720px) {
    .row { grid-template-columns: 1fr; }
    .prov { flex-direction: row; align-items: center; flex-wrap: wrap; }
    .edit-btn { margin-left: auto; }
  }

  /* ---------- 編輯視窗 ---------- */
  dialog {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--panel-edge); border-radius: 14px;
    padding: 22px; width: min(480px, 92vw);
    margin: auto; /* 上面的 * reset 會吃掉 UA 的 margin:auto,不補回來 dialog 會貼在左上角 */
  }
  dialog::backdrop { background: rgba(3,7,18,.7); }
  dialog h2 { font-size: 16px; margin-bottom: 4px; letter-spacing: 2px; }
  dialog .hint { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  fieldset {
    border: 1px solid var(--panel-edge); border-radius: 10px;
    padding: 10px 12px 12px; margin-bottom: 12px;
  }
  legend { font-size: 12px; color: var(--sky); padding: 0 6px; letter-spacing: 1px; }
  .frow { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .frow label { font-size: 12px; color: var(--muted); min-width: 86px; }
  input, select {
    font: inherit; font-size: 13px; color: var(--text);
    background: #0b1526; border: 1px solid var(--panel-edge); border-radius: 6px;
    padding: 5px 8px; flex: 1; min-width: 0;
  }
  input[type="number"] { max-width: 90px; flex: none; }
  .dlg-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }

  /* ---------- Toast 通知 ---------- */
  #toast {
    position: fixed; right: 20px; bottom: 20px; z-index: 50;
    max-width: min(420px, 90vw);
    background: #16223c; border: 1px solid var(--sky); border-radius: 10px;
    padding: 12px 16px; font-size: 13px; line-height: 1.5;
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
    opacity: 0; transform: translateY(8px); pointer-events: none;
    transition: opacity .3s, transform .3s;
  }
  #toast.show { opacity: 1; transform: none; }
  #toast.err { border-color: #ef4444; }

  /* ---------- 浮動小工具模式(?widget=1,見 floating-widget.ps1) ---------- */
  /* 只留供應商卡片本身,拿掉標題/狀態/語系/新增按鈕;背景與卡片底色都改半透明,讓桌面透出來 */
  .widget-mode body { background: transparent; padding: 8px; }
  .widget-mode header { display: none; }
  /* 卡片背景透明度分「平常/滑鼠移入」兩段(--card-alpha / --card-alpha-hover,皆由滑桿寫入
     inline 自訂屬性);hover 值沒設定時退回平常值。實際取用走中介變數 --ca。 */
  html.widget-mode { --ca: var(--card-alpha, .55); }
  html.widget-mode:hover { --ca: var(--card-alpha-hover, var(--card-alpha, .55)); }
  .widget-mode .row { background: linear-gradient(180deg, rgba(22,34,60,var(--ca,.55)), rgba(18,27,48,var(--ca,.55))); }
  /* 浮窗控制列:透明度滑桿＋收納鈕,平常隱形,滑鼠移入浮窗才浮現(同 #dragHint 的邏輯) */
  #widgetCtrl { display: none; }
  html.widget-mode:not(.mini-mode) #widgetCtrl {
    display: flex; position: fixed; right: 10px; bottom: 10px; z-index: 60;
    gap: 6px; align-items: center; padding: 4px 8px; border-radius: 8px;
    background: rgba(10,16,32,.8); border: 1px solid rgba(255,255,255,.12);
    opacity: 0; transition: opacity .25s;
  }
  html.widget-mode:hover #widgetCtrl { opacity: 1; }
  #widgetCtrl input[type=range] { width: 56px; height: 14px; accent-color: #7dd3fc; cursor: pointer; }
  #widgetCtrl button.on { background: rgba(125,211,252,.3); color: #fff; border-color: rgba(125,211,252,.6); }
  #widgetCtrl button {
    background: none; border: 1px solid rgba(255,255,255,.2); border-radius: 6px;
    color: var(--muted); font-size: 12px; line-height: 1; padding: 3px 6px;
  }
  #widgetCtrl button:hover { color: var(--fg); border-color: rgba(255,255,255,.4); }
  /* 血條軌道(空的部分)維持半透明;填色不再壓 alpha —— 主人 2026-07-19 定案:
     亮度比照薅羊毛金條(不透明),直接沿用一般模式的全亮漸層(含倒數條)。 */
  .widget-mode .bar { background: rgba(8,13,26,.18); }
  /* 主人指定:標籤(目前使用率…)與副標(已用 x%)改用跟血條「剩 %」一樣的白字,方便閱讀;
     薅羊毛區的文字也一併調亮 */
  .widget-mode .metric-label, .widget-mode .sub,
  .widget-mode .ctx-line, .widget-mode details.ctx-more,
  .widget-mode .wool summary, .widget-mode .wool-brief, .widget-mode .wool-stats,
  .widget-mode .wool-note, .widget-mode .wool-form {
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.9);
  }
  /* widget 只有 Claude 一張卡,▲▼ 排序鍵沒意義(窄寬度觸發 RWD 才顯示出來的),藏掉 */
  .widget-mode .move-btns { display: none; }
  /* 緊湊版面:字級維持整數 px(125% DPI 下 CSS zoom 的非整數字級會發糊,主人反應過),
     只縮 padding/間距/血條高度,約等於原尺寸 88% 的密度。-Scale ≠1 時 zoom 仍會疊加。 */
  .widget-mode body { padding: 6px; }
  .widget-mode #rows { gap: 10px; }
  .widget-mode .row { padding: 10px 12px; gap: 8px; border-radius: 12px; }
  .widget-mode .prov { gap: 4px; }
  .widget-mode .prov-name { font-size: 15px; }
  .widget-mode .metrics { gap: 8px; }
  .widget-mode .bar { height: 20px; }
  .widget-mode .bar.mini { height: 9px; }
  .widget-mode .metric-label { margin-bottom: 3px; }
  .widget-mode .sub { margin-top: 3px; }
  .widget-mode .wool { margin-top: 10px; padding: 8px 12px 10px; border-radius: 12px; }
  .widget-mode .wool-body { margin-top: 8px; gap: 8px; }

  /* ---------- 瀏覽器完整版字體(主人 2026-07-19:比照 widget 放大調亮;widget 尺寸已調好不動) ---------- */
  html:not(.widget-mode) .metric-label { font-size: 13px; color: var(--text); }
  html:not(.widget-mode) .src { font-size: 11px; }
  html:not(.widget-mode) .sub { font-size: 12px; color: var(--text); }
  html:not(.widget-mode) .bar-text { font-size: 13px; }
  html:not(.widget-mode) .ctx-line, html:not(.widget-mode) details.ctx-more { font-size: 12px; color: var(--text); }
  html:not(.widget-mode) .prov-meta { font-size: 12px; color: var(--text); }
  html:not(.widget-mode) .wool-brief { font-size: 13px; color: var(--text); }
  html:not(.widget-mode) .wool-stats { font-size: 14px; }
  html:not(.widget-mode) .wool-note { font-size: 12px; color: #b6c5e0; }
  html:not(.widget-mode) .wool-form { font-size: 13px; color: var(--text); }
  /* 捲軸也改透明:隱藏上下箭頭圖示,軌道透明,滑塊改半透明白 */
  .widget-mode ::-webkit-scrollbar { width: 8px; }
  .widget-mode ::-webkit-scrollbar-track { background: transparent; }
  .widget-mode ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }
  .widget-mode ::-webkit-scrollbar-button { display: none; width: 0; height: 0; }
  /* 拖動視窗:WebView2 會吞掉頁面範圍內所有滑鼠事件,宿主(floating-widget.ps1)的隱形邊框
     只有幾 px 很難抓。改成整個內容區都能按住拖動(互動元件除外,見 <body> 開頭的 mousedown
     處理),hover 時顯示抓取游標 + 頂端 ⠿ 拖動提示條,讓使用者知道可以拖。 */
  .widget-mode body { cursor: grab; }
  .widget-mode :is(button, summary) { cursor: pointer; }
  .widget-mode :is(input, select, textarea), .widget-mode dialog { cursor: auto; }
  #dragHint { display: none; }
  .widget-mode #dragHint {
    display: block; position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    padding: 3px 16px 4px; border-radius: 0 0 10px 10px;
    background: rgba(255,255,255,.16); color: rgba(255,255,255,.8);
    font-size: 11px; line-height: 1; letter-spacing: 4px;
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 40;
    user-select: none;
  }
  html.widget-mode:hover #dragHint { opacity: 1; }
  html.mini-mode #dragHint { display: none; } /* 迷你模式只有 20px 高,沒空間;整行都可拖,游標提示就夠 */

  /* ---------- 迷你橫式模式(?widget=1&mini=1&provider=xxx,見 floating-widget.ps1 -Mini) ---------- */
  /* 一次只顯示一個供應商:名稱 + 血條 + 百分比 + 重置倒數,擠進約 20px 高一行;方向鍵上/下切換供應商 */
  #miniLine { display: none; }
  .mini-mode body { padding: 0; }
  .mini-mode #rows { display: none; }
  .mini-mode #miniLine {
    display: flex; align-items: center; gap: 6px;
    height: 20px; padding: 0 6px; box-sizing: border-box;
    background: linear-gradient(180deg, rgba(22,34,60,.6), rgba(18,27,48,.6));
    border-radius: 6px; font-size: 11px; white-space: nowrap; overflow: hidden;
  }
  .mini-mode .mini-name {
    font-weight: 700; flex: none; max-width: 30%;
    overflow: hidden; text-overflow: ellipsis;
  }
  .mini-mode #miniLine .bar { height: 14px; border-radius: 4px; flex: 1 1 auto; min-width: 40px; }
  .mini-mode #miniLine .bar-text { font-size: 10px; letter-spacing: 0; }
  .mini-mode #miniLine .cd { flex: 0 0 auto; width: 30%; min-width: 60px; }
</style>
</head>
<body>
<script>
// 浮動小工具模式(見 floating-widget.ps1):網址帶 ?widget=1 時加上 widget-mode class,
// 背景改透明(讓 WebView2 host 設的 DefaultBackgroundColor 透出桌面)、隱藏標題列/狀態/語系/
// 新增提供商按鈕、卡片底色改半透明;一般瀏覽器開啟不受影響。
if (new URLSearchParams(location.search).get('widget') === '1') {
  document.documentElement.classList.add('widget-mode');
  if (new URLSearchParams(location.search).get('mini') === '1') {
    document.documentElement.classList.add('mini-mode');
  }
  // 縮放(floating-widget.ps1 -Scale 帶進來的 &scale=):只 zoom 內容區塊(#rows/#woolBox),
  // 不 zoom 整個 root —— zoom 掛在 root 上會把 top-layer 的 <dialog> 置中算壞(被擠到左邊 2/3),
  // 區塊級 zoom 則完全不影響 dialog。宿主的自量測高度量的是 zoom 後的 rect,不用另外換算。
  const zsc = parseFloat(new URLSearchParams(location.search).get('scale'));
  if (zsc > 0 && zsc !== 1) {
    const st = document.createElement('style');
    st.textContent = `#rows, #woolBox { zoom: ${zsc}; }`;
    document.head.appendChild(st);
  }
  // 卡片背景透明度(平常/滑鼠移入兩段):提早套用避免載入閃一下預設值;滑桿在 initWidgetCtrl() 綁定
  try {
    const alpha = parseFloat(localStorage.getItem('woolWidgetAlpha'));
    if (alpha >= 0.05 && alpha <= 1) document.documentElement.style.setProperty('--card-alpha', alpha);
    const alphaH = parseFloat(localStorage.getItem('woolWidgetAlphaHover'));
    if (alphaH >= 0.05 && alphaH <= 1) document.documentElement.style.setProperty('--card-alpha-hover', alphaH);
  } catch {}
  // WebView2/WKWebView 是獨立的原生子視窗,會吞掉自己範圍內所有滑鼠事件,原生宿主只剩幾 px
  // 的隱形邊框能拖,很難抓。改成由頁面發起:在非互動區按下左鍵時 postMessage('drag') 通知宿主
  // (Windows: floating-widget.ps1/AiDashWidget 收到後轉送 WM_NCLBUTTONDOWN+HTCAPTION 由原生
  // 接手拖移;macOS: AiDashWidgetMac 收到後呼叫 NSWindow.performDrag)。按鈕/輸入框/排序把手/
  // 摺疊摘要/對話框、以及捲軸上的按壓不觸發,維持原本互動不受影響。一般瀏覽器開 ?widget=1
  // 時沒有 chrome.webview 也沒有對應的 webkit.messageHandlers,整段自動跳過。
  const dragHandler = window.chrome && window.chrome.webview
    ? (msg) => window.chrome.webview.postMessage(msg)
    : (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.dragHandler)
      ? (msg) => window.webkit.messageHandlers.dragHandler.postMessage(msg)
      : null;
  if (dragHandler) {
    window.addEventListener('mousedown', (e) => {
      if (e.button !== 0 || !(e.target instanceof Element)) return;
      if (e.target.closest('button, input, select, textarea, summary, dialog, .drag-handle')) return;
      const de = document.documentElement;
      if (e.clientX >= de.clientWidth || e.clientY >= de.clientHeight) return; // 按在捲軸上
      dragHandler('drag');
      e.preventDefault();
    });
  }
}
</script>

function detectLang() {
  const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  return nav.startsWith('zh') ? 'zh-Hant' : 'en';
}
function loadLang() {
  const saved = localStorage.getItem(LANG_KEY);
  return (saved === 'zh-Hant' || saved === 'en') ? saved : detectLang();
}
let lang = loadLang();
function t(key, params) {
  let str = (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key;
  if (params) for (const k in params) str = str.replace('{' + k + '}', params[k]);
  return str;
}
function applyStaticI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  const toggle = $('#langToggle');
  toggle.textContent = t('langToggleLabel');
  toggle.title = t('langToggleTitle');
}
function setLang(l) {
  lang = l;
  localStorage.setItem(LANG_KEY, l);
  applyStaticI18n();
  renderAll();
  renderWool();
  if (dlg.open && editingId) openDialog(editingId);
  poll(); // 伺服器端錯誤訊息(autoData[x].error)是依語言即時翻譯,重新輪詢才會更新成新語言
}

// ---------------- 狀態 ----------------
// [id, 名稱, 是否支援自動同步] — Kiro 由伺服器偵測 CLI 憑證,未登入時回報原因
const BUILTINS = [
  ['claude', 'Claude', true],
  ['codex', 'Codex', true],
  ['minimax', 'MiniMax', true],
  ['kiro', 'Kiro', true],
  ['antigravity', 'Antigravity', true],
];
let autoData = {};          // /api/usage 回傳的自動資料(不落地)
let online = false;
let lastSync = null;
let state = load();

function mkProvider(id, name, autoKey) {
  const now = Date.now();
  const p = {
    id, name, autoKey: autoKey || null,
    manual: {
      session:  { usedPct: 35, resetsAt: now + 2 * 3600e3, windowMin: 300 },
      context:  { usedPct: 20 },
      longterm: { usedPct: 45, resetsAt: now + 3 * 86400e3, windowMin: 10080, label: '每週' }, // label 為內部標準值(中文),顯示時經 t() 翻譯
    },
  };
  if (id === 'kiro') { // Kiro 是月配額制
    p.manual.longterm = { usedPct: 0, resetsAt: now + 15 * 86400e3, windowMin: 43200, label: '每月' };
  }
  return p;
}
function mkBuiltin([id, name, hasAuto]) { return mkProvider(id, name, hasAuto ? id : null); }
function defaultState() {
  return { providers: BUILTINS.map(mkBuiltin) };
}
// 內建提供商只播種一次:升級後自動出現,使用者刪除後不會復活
function seedBuiltins(s) {
  s.seeded = Array.isArray(s.seeded) ? s.seeded
    : s.providers.filter(p => BUILTINS.some(b => b[0] === p.id)).map(p => p.id);
  let added = false;
  for (const b of BUILTINS) {
    if (!s.seeded.includes(b[0])) {
      s.providers.push(mkBuiltin(b));
      s.seeded.push(b[0]);
      added = true;
    }
    // 遷移:內建提供商升級為自動同步時,補上既有列的 autoKey
    const existing = s.providers.find(p => p.id === b[0]);
    if (existing && b[2] && !existing.autoKey) {
      existing.autoKey = b[0];
      added = true;
    }
  }
  // 2026-07-19 主人裁決:MiniMax/Kiro 用不到,一次性移除(想用時仍可從「＋ 新增提供商」加回,
  // 加回後不會再被這裡砍掉)。旗標記在 state,對瀏覽器與浮窗(各自的 localStorage)都各跑一次。
  if (!s.purgedUnused) {
    s.providers = s.providers.filter(p => p.id !== 'minimax' && p.id !== 'kiro');
    s.purgedUnused = true;
    added = true;
  }
  if (added) localStorage.setItem(LS_KEY, JSON.stringify(s));
  return s;
}
function load() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && Array.isArray(s.providers) && s.providers.length) return seedBuiltins(s);
  } catch {}
  return seedBuiltins(defaultState());
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// ---------------- 資料合成:自動優先,手動保底 ----------------
function effective(p) {
  const a = p.autoKey ? autoData[p.autoKey] : null;
  const auto = (a && a.ok) ? a : null;
  // src 為內部標準值('manual'/'auto'),顯示時經 t('srcManual'/'srcAuto') 翻譯
  const sess = { ...p.manual.session, src: 'manual' };
  const lt   = { ...p.manual.longterm, src: 'manual' };

  if (auto && auto.session === null) {
    // 上游明確回報「此提供商沒有 session 級資料」(如 Antigravity 只有週配額,無 5 小時層級)。
    // 2026-07-04 使用者確認:這種情況不要用手動預設值冒充,改顯示無法讀取(跟 Context 一致),
    // 即使代價是手動值從此被永久蓋過、無法在這個欄位自行手動追蹤。
    sess.usedPct = null; sess.resetsAt = null; sess.src = 'auto';
  } else if (auto && auto.session) {
    if (auto.session.usedPct != null) { sess.usedPct = auto.session.usedPct; sess.src = 'auto'; }
    if (auto.session.resetsAt) { const t = Date.parse(auto.session.resetsAt); if (!isNaN(t)) sess.resetsAt = t; }
    if (auto.session.windowMinutes) sess.windowMin = auto.session.windowMinutes;
    if (auto.session.isActive === false) sess.inactive = true; // 視窗未啟動,resets_at 是漂移佔位值
  }
  if (auto && auto.longterm === null) {
    lt.usedPct = null; lt.resetsAt = null; lt.src = 'auto';
  } else if (auto && auto.longterm) {
    if (auto.longterm.usedPct != null) { lt.usedPct = auto.longterm.usedPct; lt.src = 'auto'; }
    if (auto.longterm.resetsAt) { const t = Date.parse(auto.longterm.resetsAt); if (!isNaN(t)) lt.resetsAt = t; }
    if (auto.longterm.windowMinutes) lt.windowMin = auto.longterm.windowMinutes;
    if (auto.longterm.isActive === false) lt.inactive = true;
    if (auto.longtermLabel) lt.label = auto.longtermLabel;
  }
  // 附加條(如 Fable 每週):上游 limits[] 回報的模型別配額,純自動、無手動保底,消失就不顯示
  const extra = [];
  if (auto && Array.isArray(auto.extra)) {
    for (const x of auto.extra) {
      if (!x || x.usedPct == null) continue;
      const ts = x.resetsAt ? Date.parse(x.resetsAt) : NaN;
      extra.push({
        label: String(x.label || ''), usedPct: x.usedPct,
        resetsAt: isNaN(ts) ? null : ts,
        windowMin: x.windowMinutes || null,
        inactive: x.isActive === false,
      });
    }
  }
  // Context:只信本機 session 掃描結果;抓不到就標示無法讀取(灰色),不用假數字
  let ctx = null;
  const rawAuto = p.autoKey ? autoData[p.autoKey] : null;
  if (rawAuto && Array.isArray(rawAuto.context) && rawAuto.context.length) {
    ctx = { sessions: rawAuto.context };
  }
  return {
    sess, lt, ctx, extra,
    autoState: p.autoKey ? (a ? (a.ok ? 'ok' : 'err') : 'wait') : 'none',
    autoErr: (a && !a.ok) ? a.error : null,
  };
}

// ---------------- 格式化 ----------------
const pad = n => String(n).padStart(2, '0');
function fmtDur(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600),
        m = Math.floor(s % 3600 / 60), sec = s % 60;
  const dayStr = d ? (d + (lang === 'zh-Hant' ? '天 ' : 'd ')) : '';
  return dayStr + pad(h) + ':' + pad(m) + ':' + pad(sec);
}
function fmtAbs(ms) {
  const t = new Date(ms);
  return (t.getMonth() + 1) + '/' + t.getDate() + '(' + WEEKDAYS_I18N[lang][t.getDay()] + ') ' + pad(t.getHours()) + ':' + pad(t.getMinutes());
}
function hpClass(usedPct) {
  if (usedPct >= 92) return 'r';   // ≥92% → 紅(撞牆邊緣)
  if (usedPct >= 85) return 'o';   // ≥85% → 橘
  if (usedPct >= 70) return 'y';   // ≥70% → 黃
  return 'g';                      // <70% → 綠
}

// ---------------- 渲染 ----------------
function srcLabel(src) {

}
function hpCell(label, usedPct, src) {
  const has = usedPct != null && isFinite(usedPct);
  // 自動同步但上游明確表示無此資料(effective() 已將 usedPct 設為 null、src 設為 'auto')時,
  // 顯示跟 Context 一致的灰色虛框「無法讀取」,不邀請使用者編輯(手動值在這個狀態下永遠會被蓋過)
  if (!has && src === 'auto') {
    return `
    <div class="metric">
      <div class="metric-label"><span>${label}</span><span class="src">${srcLabel(src)}</span></div>
      <div class="bar na"><span class="bar-text na-text">${t('naText')}</span></div>
      <div class="sub">${t('naSub')}</div>
    </div>`;
  }
  const used = has ? Math.min(100, Math.max(0, usedPct)) : 0;
  const remain = 100 - used;
  return `
    <div class="metric">
      <div class="metric-label"><span>${label}</span><span class="src">${srcLabel(src)}</span></div>
      <div class="bar">
        <div class="fill ${hpClass(used)}" style="width:${has ? remain : 0}%"></div>
        <div class="ticks"></div>
        <span class="bar-text">${has ? t('remainPct', { pct: remain.toFixed(remain < 10 ? 1 : 0) }) : '—'}</span>
      </div>
      <div class="sub">${has ? t('usedPct', { pct: used.toFixed(1) }) : t('editHintPlaceholder')}</div>
    </div>`;
}
function ctxCell(ctx) {
  if (!ctx) {
    return `
    <div class="metric">
      <div class="metric-label"><span>${t('labelContextUsage')}</span><span class="src">—</span></div>
      <div class="bar na"><span class="bar-text na-text">${t('naText')}</span></div>
      <div class="sub">${t('naSub')}</div>
    </div>`;
  }
  const list = ctx.sessions;
  const s0 = list[0];
  const used = Math.min(100, Math.max(0, s0.usedPct));
  const remain = 100 - used;
  const line = s => {
    const r = 100 - Math.min(100, Math.max(0, s.usedPct));

      <div class="bar mini"><div class="fill ${hpClass(s.usedPct)}" style="width:${r}%"></div></div>

  };
  const sub = list.length > 1
    ? `<details class="ctx-more"><summary>${t('activeSessionsCount', { label: escapeHtml(s0.label), n: list.length })}</summary>${list.map(line).join('')}</details>`
    : `<div class="sub">${t('activeSessionUsed', { label: escapeHtml(s0.label), pct: used.toFixed(1) })}</div>`;

function cdCell(label, resetsAt, windowMin, src, pid, kind, inactive) {
  // 視窗未啟動(is_active=false):上游的 resets_at 是隨輪詢漂移的佔位值,

  const has = resetsAt != null && isFinite(resetsAt);

  if (!has && src === 'auto') {
    return `
    <div class="metric">
      <div class="metric-label"><span>${label}</span><span class="src">${srcLabel(src)}</span></div>
      <div class="bar na"><span class="bar-text na-text">${t('naText')}</span></div>
      <div class="sub">${t('naSub')}</div>
    </div>`;

function ltLabelText(rawLabel) {
  return rawLabel === '每月' ? t('ltMonthly') : t('ltWeekly');
}
// ---------------- 迷你橫式模式:一次只顯示一個供應商,方向鍵上/下切換 ----------------
let miniIndex = 0;
const isMiniMode = document.documentElement.classList.contains('mini-mode');
if (isMiniMode) {
  const wantId = new URLSearchParams(location.search).get('provider');
  document.addEventListener('keydown', (ev) => {
    if (!state.providers.length) return;
    if (ev.key === 'ArrowUp') { miniIndex = (miniIndex - 1 + state.providers.length) % state.providers.length; renderMini(); }
    else if (ev.key === 'ArrowDown') { miniIndex = (miniIndex + 1) % state.providers.length; renderMini(); }
  });
  // wantId 要等 state 載入(load() 在下面才呼叫)後才能查,先記著,首次 renderMini() 再解析一次
  window.__miniWantId = wantId;
}
function renderMini() {
  const box = $('#miniLine');
  if (!box) return;
  if (window.__miniWantId != null) {
    const idx = state.providers.findIndex(p => p.id === window.__miniWantId);
    if (idx >= 0) miniIndex = idx;
    window.__miniWantId = null; // 只在第一次渲染時解析一次,之後上下鍵切換的選擇不會被蓋掉
  }

  if (miniIndex >= state.providers.length) miniIndex = 0;

      ? `<div class="bar cd"><span class="bar-text">${t('notStartedText')}</span></div>`

         data-resets="${e.sess.resetsAt || ''}" data-window="${e.sess.windowMin || ''}">
      <div class="fill" style="width:0%"></div>

let minorOpen = false; // 摺疊區開合狀態要跨 renderAll 存活(每次輪詢都會整塊重畫)
function renderAll() {

        ${e.extra.map((x, i) => {

               + cdCell(weekly ? t('extraWeeklyRespawn', { label: lbl }) : t('respawnOfLabel', { label: lbl }), x.resetsAt, x.windowMin, 'auto', p.id, 'extra' + i, x.inactive);
        }).join('')}

  // 2026-07-19 主人裁決:目前只用 Claude,其餘提供商整組降級收進摺疊區(預設收起)

  state.providers.forEach((p, idx) => (p.id === 'claude' ? main : minor).push([p, idx]));

function moveProvider(id, dir) {
  const i = state.providers.findIndex(p => p.id === id);
  const j = dir === 'up' ? i - 1 : i + 1;
  if (i < 0 || j < 0 || j >= state.providers.length) return;
  [state.providers[i], state.providers[j]] = [state.providers[j], state.providers[i]];
  save();
  renderAll();
}

// ---------------- 上下拖拉排序 ----------------
let dragId = null;
let dragFromHandle = false;
function clearDragMarks() {
  document.querySelectorAll('.row.drag-over-top, .row.drag-over-bottom')
    .forEach(r => r.classList.remove('drag-over-top', 'drag-over-bottom'));
}
function wireDragSort(box) {
  box.querySelectorAll('.row').forEach(row => {
    const handle = row.querySelector('.drag-handle');
    handle.addEventListener('mousedown', () => { dragFromHandle = true; });
    row.addEventListener('dragstart', e => {
      if (!dragFromHandle) { e.preventDefault(); return; } // 只允許從 ⠿ 把手拖
      dragId = row.dataset.row;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragId);
    });
    row.addEventListener('dragend', () => {
      dragFromHandle = false;
      dragId = null;
      row.classList.remove('dragging');
      clearDragMarks();
    });
    row.addEventListener('dragover', e => {
      if (!dragId || row.dataset.row === dragId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const rect = row.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      row.classList.toggle('drag-over-top', before);
      row.classList.toggle('drag-over-bottom', !before);
    });
    row.addEventListener('dragleave', () => {
      row.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const id = dragId || e.dataTransfer.getData('text/plain');
      if (!id || row.dataset.row === id) return;
      const rect = row.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      const list = state.providers;
      const fromIdx = list.findIndex(p => p.id === id);
      if (fromIdx < 0) return;
      const [moved] = list.splice(fromIdx, 1);
      let toIdx = list.findIndex(p => p.id === row.dataset.row);
      if (!before) toIdx++;
      list.splice(toIdx, 0, moved);
      dragId = null;
      dragFromHandle = false;
      save();
      renderAll();
    });
  });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

// ---------------- 每秒心跳:倒數條 + 手動模式到期翻新 ----------------
const SOON_MS = 30 * 60000; // 剩不到 30 分鐘 → 外框開始發亮蓄力
function tick() {
  const now = Date.now();
  document.querySelectorAll('[data-cd]').forEach(el => {
    const resets = Number(el.dataset.resets);
    const winMs = Number(el.dataset.window) * 60000;
    const fill = el.querySelector('.fill');
    const text = el.querySelector('.bar-text');
    if (!resets) { fill.style.width = '0%'; text.textContent = '—'; el.classList.remove('soon', 'ready'); return; }
    const remain = resets - now;
    if (remain <= 0) {
      el.classList.remove('soon');
      el.classList.add('ready');
      fill.style.width = '100%';
      text.textContent = t('readyText');
      return;
    }
    el.classList.remove('ready');
    if (remain <= SOON_MS) {
      el.classList.add('soon');
      const frac = Math.min(1, Math.max(0, remain / SOON_MS)); // 1 = 剛進 30 分鐘,0 = 快到了
      el.style.setProperty('--charge-speed', (0.35 + frac * 1.25).toFixed(2) + 's');
    } else {
      el.classList.remove('soon');
      el.style.removeProperty('--charge-speed');
    }
    const frac = winMs > 0 ? Math.min(1, Math.max(0, 1 - remain / winMs)) : 0;
    fill.style.width = (frac * 100).toFixed(2) + '%';
    text.textContent = fmtDur(remain);
  });

  // 手動模式:重置時間過了 → 自動推進到下一週期,使用率歸零
  let changed = false;
  for (const p of state.providers) {
    const e = effective(p);
    for (const [kind, eff] of [['session', e.sess], ['longterm', e.lt]]) {
      if (eff.src !== 'manual') continue;
      const m = p.manual[kind];
      if (m.resetsAt && m.windowMin && m.resetsAt <= now) {
        while (m.resetsAt <= now) m.resetsAt += m.windowMin * 60000;
        m.usedPct = 0;
        changed = true;
      }
    }
  }
  if (changed) { save(); renderAll(); }
}
setInterval(tick, 1000);

// ---------------- 向本機伺服器輪詢 ----------------
async function poll() {
  try {
    const r = await fetch('api/usage?lang=' + lang, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    autoData = j.providers || {};
    online = true;
    lastSync = Date.now();
  } catch {
    online = false;
  }
  $('#statusDot').className = 'dot ' + (online ? 'ok' : '');
  $('#statusText').textContent = online
    ? t('serverConnected', { time: fmtAbs(lastSync) })
    : t('offlineMode');
  renderAll();
}
setInterval(poll, 60000);

// ---------------- 🐑 薅羊毛進度(/api/wool,5 分鐘輪詢;掃描中則 8 秒後再試) ----------------
let woolData = null;
let woolTimer = null;
async function fetchWool() {
  try {
    const r = await fetch('api/wool', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    woolData = await r.json();
  } catch { woolData = null; }
  renderWool();
  clearTimeout(woolTimer);
  woolTimer = setTimeout(fetchWool, (woolData && woolData.scanning) ? 8000 : 300000);
}
// 2026-07-19 主人指定:金額一律轉台幣顯示(匯率可在表單調,内部計價仍是 USD)
function fmtTwd(v, rate) {
  if (v == null || !isFinite(v)) return '—';
  const nt = v * rate;
  return 'NT$' + (nt >= 100 ? Math.round(nt).toLocaleString() : (Math.round(nt * 10) / 10));
}
function renderWool() {
  const box = $('#woolBox');
  if (!box || isMiniMode) return;
  const brief = $('#woolBrief'), body = $('#woolBody');
  if (!woolData || !woolData.ok) {
    brief.textContent = t('woolOffline');
    body.innerHTML = '';
    return;
  }
  const w = woolData;
  const rate = (w.twdRate > 0) ? w.twdRate : 30;
  const $nt = v => fmtTwd(v, rate);
  brief.textContent = t('woolBurned', { used: $nt(w.totalUsd), budget: $nt(w.budgetUsd) })
    + (w.scanning ? ' · ' + t('woolScanning') : '');
  // 使用者正在表單裡打字時不要整塊重畫(輪詢會把輸入洗掉)
  if (body.contains(document.activeElement) && document.activeElement !== body) return;
  const pct = w.budgetUsd > 0 ? Math.min(100, w.totalUsd / w.budgetUsd * 100) : 0;
  const stats = [];
  stats.push(`<span>${t('woolBurned', { used: $nt(w.totalUsd), budget: $nt(w.budgetUsd) })}</span>`);
  stats.push(`<span>${t('woolRemain', { remain: $nt(w.remainingUsd) })}</span>`);
  if (w.perDayUsd > 0) {
    stats.push(`<span>${t('woolRate', { rate: $nt(w.perDayUsd) })}</span>`);
    if (w.daysLeft != null && w.remainingUsd > 0) stats.push(`<span>${t('woolEta', { days: w.daysLeft, date: w.depleteDate || '—' })}</span>`);
  } else {
    stats.push(`<span>${t('woolNoRate')}</span>`);
  }
  if (w.remainingUsd <= 0) {
    stats.push(`<span>${t('woolDone')}</span>`);
  } else if (w.expiryDate && w.depleteDate) {
    stats.push(`<span>${w.depleteDate <= w.expiryDate ? t('woolFitYes', { date: w.expiryDate }) : t('woolFitNo', { date: w.expiryDate })}</span>`);
  }
  if (w.msgCount) stats.push(`<span class="wool-note">${t('woolMsgs', { n: w.msgCount, date: w.firstDate || '—' })}</span>`);
  body.innerHTML = `
    <div class="bar wool-bar">
      <div class="fill" style="width:${pct.toFixed(2)}%"></div>
      <div class="ticks"></div>
      <span class="bar-text">${w.remainingUsd <= 0 ? t('woolDone') : t('woolPctMilked', { pct: pct.toFixed(1) })}</span>
    </div>
    <div class="wool-stats">${stats.join('')}</div>
    <div class="wool-form">
      <label>${t('woolBudgetLabel')}<input id="wBudget" type="number" min="0.5" step="0.5" value="${w.budgetUsd}"></label>
      <label>${t('woolTwdRateLabel')}<input id="wTwd" type="number" min="1" step="0.1" value="${rate}"></label>
      <label>${t('woolStartLabel')}<input id="wStart" type="date" value="${w.startDate || ''}"></label>
      <label>${t('woolExpiryLabel')}<input id="wExpiry" type="date" value="${w.expiryDate || ''}"></label>
      <button type="button" id="wSave">${t('woolSaveBtn')}</button>
    </div>
    <div class="wool-note">${t('woolDisclaimer')}</div>`;
  $('#wSave').addEventListener('click', saveWoolConfig);
}
async function saveWoolConfig() {
  try {
    const r = await fetch('api/wool/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        budgetUsd: $('#wBudget').value,
        twdRate: $('#wTwd').value,
        startDate: $('#wStart').value || null,
        expiryDate: $('#wExpiry').value || null,
      }),
    });
    const j = await r.json();
    if (!j.ok) { toast(t('woolSaveFailed', { err: j.error || 'HTTP ' + r.status }), true); return; }
    woolData = j;
    document.activeElement && document.activeElement.blur(); // 解除焦點,讓 renderWool 重畫
    renderWool();
    toast(t('woolSaved'));
  } catch (e) {
    toast(t('woolSaveFailed', { err: String(e && e.message || e) }), true);
  }
}

// ---------------- 編輯視窗 ----------------
const dlg = $('#dlg');
let editingId = null;

function toLocalInput(ms) {
  if (!ms || !isFinite(ms)) return '';
  const t = new Date(ms - new Date().getTimezoneOffset() * 60000);
  return t.toISOString().slice(0, 16);
}
function fromLocalInput(v) {
  if (!v) return null;
  const t = Date.parse(v);
  return isNaN(t) ? null : t;
}

let toastTimer = null;
function toast(msg, isErr) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 6000);
}

async function saveMinimaxKey(key) {
  try {
    const r = await fetch('api/minimax/key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey: key, lang }),
    });
    const j = await r.json();
    if (!j.ok) { toast(t('saveFailed', { err: j.error || 'HTTP ' + r.status }), true); return; }
    if (j.cleared) {
      toast(t('keyCleared'));
      if (autoData.minimax) autoData.minimax.keySet = false;
    } else if (j.test) {
      autoData.minimax = j.test; // 立即反映,不等下一次輪詢
      if (j.test.ok) toast(t('keySavedSuccess'));
      else toast(t('keySavedTestFailed', { err: j.test.error || t('unknownError') }), true);
    }
    renderAll();
    await poll();
  } catch {
    toast(t('offlineCantSave'), true);
  }
}

function openDialog(pid) {
  editingId = pid;
  const p = state.providers.find(x => x.id === pid);
  if (!p) return;
  $('#dlgTitle').textContent = t('editDlgTitle');
  const isAuto = pid && p.autoKey && autoData[p.autoKey] && autoData[p.autoKey].ok;
  $('#dlgHint').textContent = isAuto ? t('dlgHintAuto') : t('dlgHintManual');
  $('#fName').value = p.name;
  $('#fSessPct').value = p.manual.session.usedPct ?? '';
  $('#fSessReset').value = toLocalInput(p.manual.session.resetsAt);
  $('#fSessWin').value = p.manual.session.windowMin ?? 300;
  $('#fLtLabel').value = p.manual.longterm.label || '每週';
  $('#fLtPct').value = p.manual.longterm.usedPct ?? '';
  $('#fLtReset').value = toLocalInput(p.manual.longterm.resetsAt);
  $('#fLtWin').value = p.manual.longterm.windowMin ?? 10080;
  $('#delBtn').style.display = pid ? '' : 'none';

  // MiniMax 專屬:網頁輸入 API Key(伺服器端加密儲存)
  const isMinimax = p.autoKey === 'minimax';
  $('#fKeyFs').style.display = isMinimax ? '' : 'none';
  if (isMinimax) {
    const mm = autoData.minimax;
    $('#fApiKey').value = '';
    $('#fApiKey').placeholder = (mm && mm.keySet) ? t('keyPlaceholderSet') : t('keyPlaceholderEmpty');
    $('#clearKeyBtn').style.display = (mm && mm.keySet) ? '' : 'none';
  }
  dlg.showModal();
}

$('#dlgForm').addEventListener('submit', () => {
  const numOr = (v, fb) => { const n = parseFloat(v); return isFinite(n) ? n : fb; };
  const p = editingId ? state.providers.find(x => x.id === editingId) : null;
  if (!p) return;
  p.name = $('#fName').value.trim() || p.name || t('unnamedDefault');
  p.manual.session.usedPct = numOr($('#fSessPct').value, null);
  p.manual.session.resetsAt = fromLocalInput($('#fSessReset').value);
  p.manual.session.windowMin = numOr($('#fSessWin').value, 300);
  p.manual.longterm.label = $('#fLtLabel').value;
  p.manual.longterm.usedPct = numOr($('#fLtPct').value, null);
  p.manual.longterm.resetsAt = fromLocalInput($('#fLtReset').value);
  p.manual.longterm.windowMin = numOr($('#fLtWin').value, 10080);
  save(); renderAll();

  const newKey = $('#fApiKey').value.trim();
  if (p.autoKey === 'minimax' && newKey) saveMinimaxKey(newKey);
});
$('#clearKeyBtn').addEventListener('click', () => {
  if (confirm(t('confirmClearKey'))) {
    saveMinimaxKey('');
    dlg.close();
  }
});
$('#cancelBtn').addEventListener('click', () => dlg.close());
$('#delBtn').addEventListener('click', () => {
  if (!editingId) return;
  const p = state.providers.find(x => x.id === editingId);
  if (p && confirm(t('confirmDelete', { name: p.name }))) {
    state.providers = state.providers.filter(x => x.id !== editingId);
    save(); dlg.close(); renderAll();
  }
});
// 新增提供商:只列出有支援自動同步、且尚未在儀表板上的
const addDlg = $('#addDlg');
$('#addBtn').addEventListener('click', () => {
  const missing = BUILTINS.filter(([id]) => !state.providers.some(p => p.id === id));
  if (!missing.length) {
    const sep = lang === 'zh-Hant' ? '、' : ', ';
    toast(t('allProvidersAdded', { list: BUILTINS.map(b => b[1]).join(sep) }));
    return;
  }
  $('#addList').innerHTML = missing.map(([id, name, hasAuto]) =>
    `<button type="button" class="primary" data-add="${id}">${name}${hasAuto ? '' : t('manualSuffix')}</button>`).join('');
  $('#addList').querySelectorAll('[data-add]').forEach(b => b.addEventListener('click', () => {
    const key = b.dataset.add;
    const entry = BUILTINS.find(x => x[0] === key);
    const name = entry[1];
    state.providers.push(mkBuiltin(entry));
    if (!state.seeded.includes(key)) state.seeded.push(key);
    save();
    renderAll();
    addDlg.close();
    toast(t('providerAdded', { name }));
    poll();
  }));
  addDlg.showModal();
});
$('#addCancel').addEventListener('click', () => addDlg.close());

// ---------------- 浮窗控制列:透明度滑桿＋右側收納(見 floating-widget.ps1) ----------------
(function initWidgetCtrl() {
  if (!document.documentElement.classList.contains('widget-mode') || isMiniMode) return;
  const slider = $('#alphaSlider'), hoverSlider = $('#alphaHoverSlider'),
        ghostBtn = $('#ghostBtn'), dockBtn = $('#dockBtn'), closeBtn = $('#widgetCloseBtn');
  if (!slider || !dockBtn) return;
  const ALPHA_KEY = 'woolWidgetAlpha', ALPHA_HOVER_KEY = 'woolWidgetAlphaHover',
        GHOST_KEY = 'woolWidgetGhost', DOCK_KEY = 'woolWidgetDock';
  let alpha = parseFloat(localStorage.getItem(ALPHA_KEY));
  if (!(alpha >= 0.1 && alpha <= 1)) alpha = 0.55;
  slider.value = Math.round(alpha * 100);
  slider.title = t('alphaSliderTitle');
  slider.addEventListener('input', () => {
    const v = slider.value / 100;
    document.documentElement.style.setProperty('--card-alpha', v);
    localStorage.setItem(ALPHA_KEY, String(v));
  });
  // 滑鼠移入時的透明度:沒調整過就跟隨平常值(CSS var 鏈退回)
  let alphaH = parseFloat(localStorage.getItem(ALPHA_HOVER_KEY));
  hoverSlider.value = Math.round(((alphaH >= 0.1 && alphaH <= 1) ? alphaH : alpha) * 100);
  hoverSlider.title = t('alphaHoverTitle');
  hoverSlider.addEventListener('input', () => {
    const v = hoverSlider.value / 100;
    document.documentElement.style.setProperty('--card-alpha-hover', v);
    localStorage.setItem(ALPHA_HOVER_KEY, String(v));
  });
  // 收納模式:狀態存 localStorage,並 postMessage 通知原生宿主移動視窗。
  // 一般瀏覽器開 ?widget=1 沒有 chrome.webview,按鈕只切狀態、不會有視窗動作。
  const post = (m) => { if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(m); };
  let docked = localStorage.getItem(DOCK_KEY) === '1';
  const paint = () => {
    dockBtn.textContent = docked ? '📌' : '⏴';
    dockBtn.title = docked ? t('dockOffTitle') : t('dockOnTitle');
  };
  dockBtn.addEventListener('click', () => {
    docked = !docked;
    localStorage.setItem(DOCK_KEY, docked ? '1' : '0');
    post(docked ? 'dock:on' : 'dock:off');
    paint();
  });
  paint();
  if (docked) post('dock:on'); // 上次收納狀態跨啟動還原
  // ✖ 關閉浮窗:宿主收到 close 訊息就 Close()(等同 Alt+F4;伺服器不受影響)。
  // 一般瀏覽器開 ?widget=1 時 post 是 no-op,按了沒作用是預期行為。
  closeBtn.title = t('closeWidgetTitle');
  closeBtn.addEventListener('click', () => post('close'));
  // 👻 滑鼠穿透:開啟後整個浮窗對滑鼠隱形(點擊直達下層視窗),浮窗本身就點不到了,
  // 關閉只能靠宿主註冊的全域快捷鍵 Ctrl+Alt+W。狀態雙向同步:按鈕→ghost:on/off 給宿主;
  // 快捷鍵切換→宿主回傳 ghostState:on/off,這裡只更新狀態不再回發。
  let ghost = localStorage.getItem(GHOST_KEY) === '1';
  const paintGhost = () => {
    ghostBtn.classList.toggle('on', ghost);
    ghostBtn.title = ghost ? t('ghostOnTitle') : t('ghostOffTitle');
  };
  ghostBtn.addEventListener('click', () => {
    ghost = !ghost;
    localStorage.setItem(GHOST_KEY, ghost ? '1' : '0');
    post(ghost ? 'ghost:on' : 'ghost:off');
    paintGhost();
  });
  paintGhost();
  if (ghost) post('ghost:on'); // 上次穿透狀態跨啟動還原(Ctrl+Alt+W 隨時可關)
  // 宿主回傳:空白處雙擊(兩次 drag <450ms)→ toggleDock;Ctrl+Alt+W → ghostState:on/off
  if (window.chrome && window.chrome.webview && window.chrome.webview.addEventListener) {
    window.chrome.webview.addEventListener('message', (e) => {
      if (e.data === 'toggleDock') dockBtn.click();
      else if (e.data === 'ghostState:on' || e.data === 'ghostState:off') {
        ghost = e.data.endsWith(':on');
        localStorage.setItem(GHOST_KEY, ghost ? '1' : '0');
        paintGhost();
      }
    });
  }
})();

// ---------------- 啟動 ----------------
applyStaticI18n();
renderAll();
poll();
fetchWool();
</script>
